#
# Build ImmortalWrt 24.10 for CMCC RAX3000M (NAND)
# Uses official immortalwrt source with open-source mt76 WiFi driver
#

name: rax3000m-24.10

permissions: write-all

on:
  repository_dispatch:
  workflow_dispatch:
  # schedule:
  #   - cron: 0 8 1 * *

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: immo-24.10/cmcc-rax3000m.config
  DIY_SH: immo-24.10/cmcc-rax3000m.sh
  FREE_DISK_SH: scripts/free_disk_space.sh
  ENV_SH: scripts/environment.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          chmod +x $FREE_DISK_SH && $FREE_DISK_SH

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update -y
          sudo -E apt-get -qq full-upgrade -y
          chmod +x $ENV_SH && $ENV_SH
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Check space usage
        run: df -hT

      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Enable build cache
        uses: klever1988/cachewrtbuild@main
        with:
          ccache: 'true'
          mixkey: 'immortalwrt2410-filogic'
          prefix: ${{ github.workspace }}/openwrt

      - name: Update & Install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom configuration & Run DIY script
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_SH

      - name: Download package
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j8 V=10
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt
          echo -e "$(($(nproc)+1)) thread compile"
          make -j$(($(nproc)+1)) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Check space usage
        if: (!cancelled())
        run: df -hT

      - name: Organize files
        id: organize
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt/bin/targets/*/*
          ls -al
          rm -rf packages
          rm -rf *.buildinfo
          rm -rf *.json
          rm -rf *.manifest
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware directory
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
        with:
          name: ImmortalWrt_24.10_RAX3000M${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Generate release tag
        id: tag
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo -e "### ImmortalWrt 24.10 - CMCC RAX3000M (NAND)" >> release.txt
          echo "- Source: immortalwrt/immortalwrt openwrt-24.10" >> release.txt
          echo "- Target: mediatek/filogic" >> release.txt
          echo "- Kernel: 6.6.x" >> release.txt
          echo "- WiFi: mt76 (open-source)" >> release.txt
          echo "- Package Manager: apk" >> release.txt
          echo "- Gateway: 192.168.100.1" >> release.txt
          echo "- Password: (none)" >> release.txt
          echo "" >> release.txt
          echo "⚠️ Requires U-Boot with FIT image support (.itb format)" >> release.txt
          release_tag=$(date +"%Y.%m.%d")-immortalwrt-24.10-cmcc_rax3000m
          echo "release_tag=${release_tag}" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ steps.tag.outputs.release_tag }}
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 3

      - name: Remove old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 10
          delete_tags: true
          delete_tag_pattern: '.*24.10.*'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
